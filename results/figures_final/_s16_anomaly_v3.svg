<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" style="background:#F8FAFC; font-family:Arial,Helvetica,sans-serif">
<text x="600" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">Extreme Case: OPC Breaks the Baseline</text>
<text x="600" y="46" text-anchor="middle" font-size="10" fill="#64748B">Intra-type OPC ω (22) ≪ Inter-type Astrocyte ω (121.8) in same brain region</text>
<rect x="40" y="65" width="540" height="355" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="310" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">Intra-type ω (OPC across regions)</text>
<text x="310" y="105" text-anchor="middle" font-size="10" fill="#64748B">OPC in SVZ vs OPC in Cortex</text>
<rect x="100" y="332" width="80" height="5" rx="4" fill="#0D9488"/>
<text x="140" y="324" text-anchor="middle" font-size="12" font-weight="700" fill="#0D9488">ω=3.2</text>
<text x="140" y="353" text-anchor="middle" font-size="10" fill="#334155">SVZ</text>
<rect x="220" y="297" width="80" height="40" rx="4" fill="#2563EB"/>
<text x="260" y="289" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">ω=22</text>
<text x="260" y="353" text-anchor="middle" font-size="10" fill="#334155">Cortex</text>
<text x="420" y="255" font-size="10" fill="#64748B" font-style="italic">Δω = 18.8 (surprisingly SMALL)</text>
<rect x="55" y="355" width="510" height="58" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
<text x="310" y="373" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Intra-type ω = 22 (LOW)</text>
<text x="310" y="390" text-anchor="middle" font-size="9" fill="#166534">OPCs in SVZ and Cortex are HIGHLY similar</text>
<text x="310" y="405" text-anchor="middle" font-size="9" fill="#166534">→ likely same origin (migration), not independent differentiation</text>
<rect x="620" y="65" width="540" height="355" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="890" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">Inter-type ω (within Cortex)</text>
<text x="890" y="105" text-anchor="middle" font-size="10" fill="#64748B">Astrocytes vs OPCs in same region</text>
<rect x="680" y="116" width="80" height="221" rx="4" fill="#DC2626"/>
<text x="720" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">ω=121.8</text>
<text x="720" y="353" text-anchor="middle" font-size="10" fill="#334155">Astrocytes</text>
<rect x="800" y="297" width="80" height="40" rx="4" fill="#2563EB"/>
<text x="840" y="289" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">ω=22</text>
<text x="840" y="353" text-anchor="middle" font-size="10" fill="#334155">OPCs</text>
<text x="1000" y="255" font-size="10" fill="#64748B" font-style="italic">Δω = 85.5 (extremely LARGE)</text>
<rect x="635" y="355" width="510" height="58" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
<text x="890" y="373" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">Inter-type ω = 121.8 (HIGH)</text>
<text x="890" y="390" text-anchor="middle" font-size="9" fill="#991B1B">Astrocytes and OPCs in SAME region are RADICALLY different</text>
<text x="890" y="405" text-anchor="middle" font-size="9" fill="#991B1B">→ independent lineages, strong local differentiation</text>
<rect x="35" y="420" width="1130" height="32" rx="8" fill="#7C3AED"/>
<text x="600" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="white">CONTRADICTION:  Intra-type ω (22) ≪ Inter-type ω (121.8)  →  OPC similarity across regions EXCEEDS cell-type difference within region</text>
</svg>